name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build native libraries for all platforms
  build-natives:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          # macOS
          - target: x86_64-apple-darwin
            os: macos-13
            use-cross: false
          - target: aarch64-apple-darwin
            os: macos-14
            use-cross: false
          # Windows
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            use-cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        run: |
          if [ "${{ matrix.use-cross }}" == "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Strip and package
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.target }}

          # Determine library name based on platform
          case ${{ matrix.target }} in
            *windows*)
              LIB_NAME="userencrypt.dll"
              SRC="target/${{ matrix.target }}/release/userencrypt.dll"
              ;;
            *apple*)
              LIB_NAME="libuserencrypt.dylib"
              SRC="target/${{ matrix.target }}/release/libuserencrypt.dylib"
              ;;
            *)
              LIB_NAME="libuserencrypt.so"
              SRC="target/${{ matrix.target }}/release/libuserencrypt.so"
              ;;
          esac

          # Strip if possible (not Windows cross-compile)
          if [[ ! "${{ matrix.target }}" == *windows* ]]; then
            strip "$SRC" || true
          fi

          cp "$SRC" "dist/${{ matrix.target }}/$LIB_NAME"

          # Create checksum
          cd dist/${{ matrix.target }}
          sha256sum "$LIB_NAME" > "$LIB_NAME.sha256"
          cd ../..

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: dist/${{ matrix.target }}/*

  # Build thin Paper plugin JAR
  build-plugin:
    name: Build Paper Plugin
    runs-on: ubuntu-latest
    needs: build-natives
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: paper/src/main/resources/natives
          pattern: native-*
          merge-multiple: true

      - name: Generate version info
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_ENV
          echo "release_url=https://github.com/${{ github.repository }}/releases/download/v$VERSION" >> $GITHUB_ENV

      - name: Build plugin with Gradle
        working-directory: paper
        run: |
          ./gradlew build \
            -PpluginVersion=$version \
            -PnativeBaseUrl=$release_url \
            --no-daemon

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper-plugin
          path: paper/build/libs/*.jar

  # Create GitHub Release with all assets
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-natives, build-plugin]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "native-*|paper-plugin"
          merge-multiple: false

      - name: Organize release files
        run: |
          mkdir -p release

          # Move plugin JAR
          mv artifacts/paper-plugin/*.jar release/

          # Move native libs to platform folders
          for dir in artifacts/native-*; do
            target=$(basename "$dir" | sed 's/native-//')
            mkdir -p "release/$target"
            mv "$dir"/* "release/$target/" 2>/dev/null || true
          done

          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
