name: Docker Release (Tron)
on:
  push:
    tags:
      - "v*"

jobs:
  # ── Step 1: Cross-compile both arches natively via zigbuild ──────────────
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: aarch64-unknown-linux-musl
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - uses: arduino/setup-protoc@v3

      - name: Install zig
        run: |
          wget -q https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz
          tar xf zig-linux-x86_64-0.13.0.tar.xz
          sudo mv zig-linux-x86_64-0.13.0 /usr/local/zig
          echo "/usr/local/zig" >> $GITHUB_PATH

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build
        run: cargo zigbuild --release --target ${{ matrix.target }} --package tron

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: tron-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/tron

  # ── Step 2: Build multi-arch Docker image using pre-built binaries ────────
  docker:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Download both binaries into dist/amd64/ and dist/arm64/
      - uses: actions/download-artifact@v4
        with:
          name: tron-amd64
          path: dist/amd64

      - uses: actions/download-artifact@v4
        with:
          name: tron-arm64
          path: dist/arm64

      - run: chmod +x dist/amd64/tron dist/arm64/tron

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prebuilt
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
