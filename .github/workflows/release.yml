name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-natives:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }}
          mkdir -p dist/${{ matrix.target }}
          cp target/${{ matrix.target }}/release/libuserencrypt.* dist/${{ matrix.target }}/ || \
          cp target/${{ matrix.target }}/release/userencrypt.dll dist/${{ matrix.target }}/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: dist/${{ matrix.target }}/*

  build-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Generate UniFFI bindings
        run: |
          cargo run --bin uniffi-bindgen generate \
            src/userencrypt.udl \
            --language kotlin \
            --out-dir core/src/main/kotlin/uniffi/

      - name: Build core library
        working-directory: core
        run: ./gradlew publishToMavenLocal

      - uses: actions/upload-artifact@v4
        with:
          name: core-library
          path: core/build/libs/*.jar

  build-paper:
    needs: [build-core]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Download core
        uses: actions/download-artifact@v4
        with:
          name: core-library
          path: ~/.m2/repository

      - name: Build Paper plugin
        working-directory: paper
        run: ./gradlew shadowJar

      - uses: actions/upload-artifact@v4
        with:
          name: paper-plugin
          path: paper/build/libs/*-all.jar

  # Create release with all artifacts
  release:
    needs: [build-natives, build-paper]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Organize release files
        run: |
          mkdir -p release
          mv paper-plugin/*.jar release/
          for dir in native-*; do
            target=$(echo $dir | sed 's/native-//')
            mkdir -p "release/$target"
            mv "$dir"/* "release/$target/"
          done

      - uses: softprops/action-gh-release@v1
        with:
          files: release/**/*
