name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-natives:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }}
          mkdir -p dist/${{ matrix.target }}
          cp target/${{ matrix.target }}/release/libuserencrypt.* dist/${{ matrix.target }}/ || \
          cp target/${{ matrix.target }}/release/userencrypt.dll dist/${{ matrix.target }}/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: dist/${{ matrix.target }}/*

  # Create release with all artifacts
  release:
    needs: [build-natives]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Organize release files
        run: |
          mkdir -p release
          for dir in native-*; do
            target=$(echo $dir | sed 's/native-//')
            mkdir -p "release/$target"
            mv "$dir"/* "release/$target/"
          done

      - uses: softprops/action-gh-release@v1
        with:
          files: release/**/*
