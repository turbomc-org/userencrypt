name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build both Linux targets in one fast job using cargo-zigbuild
  build-linux:
    name: Build Linux Natives
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-musl

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build x86_64 GNU (glibc 2.17 compatible)
        run: |
          cargo zigbuild --release --target x86_64-unknown-linux-gnu.2.17
          mkdir -p dist/x86_64-unknown-linux-gnu
          cp target/x86_64-unknown-linux-gnu/release/libuserencrypt.so dist/x86_64-unknown-linux-gnu/
          strip dist/x86_64-unknown-linux-gnu/libuserencrypt.so

      - name: Build ARM64 musl (static)
        run: |
          cargo zigbuild --release --target aarch64-unknown-linux-musl
          mkdir -p dist/aarch64-unknown-linux-musl
          cp target/aarch64-unknown-linux-musl/release/libuserencrypt.so dist/aarch64-unknown-linux-musl/
          strip dist/aarch64-unknown-linux-musl/libuserencrypt.so

      - name: Generate checksums
        run: |
          for dir in dist/*/; do
            cd "$dir"
            sha256sum * > checksums.sha256
            cd ../..
          done

      - name: Upload natives
        uses: actions/upload-artifact@v4
        with:
          name: linux-natives
          path: dist/**/*

  # Build Paper plugin (no natives bundled - lazy download)
  build-plugin:
    name: Build Paper Plugin
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin (triggers build.rs)
        working-directory: paper
        run: |
          # Build.rs will generate UniFFI bindings and core Kotlin files
          ../gradlew shadowJar -Pversion=${GITHUB_REF#refs/tags/v}

      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: paper-plugin
          path: paper/build/libs/*-all.jar

  # Create release with all assets
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-plugin]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Organize release
        run: |
          mkdir -p release
          mv paper-plugin/*.jar release/
          mv linux-natives/* release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
